<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1614">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Block — NYC 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inconsolata:wght@400;500;600;700&display=swap');
  :root {
    --ink:#0e1614; --ink-2:#16211e; --ink-3:#1e2b27; --line:#2c3a35; --line-soft:#223029;
    --fog:#8ea39c; --fog-dim:#5c6f68; --chalk:#eef2ee; --sig:#d8ff3e; --hot:#ff6b4a; --cool:#5ac8e0; --gold:#e8c86a;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html { -webkit-text-size-adjust:100%; background:#0e1614; min-height:100%; }
  body {
    background:var(--ink); color:var(--chalk); font-family:'Inconsolata',ui-monospace,monospace; line-height:1.5;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); min-height:100vh;
  }
  header {
    padding:14px 20px 14px; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;
    background:linear-gradient(var(--ink),rgba(14,22,20,0.94)); backdrop-filter:blur(8px);
  }
  .topline { display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  .eyebrow { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fog); font-weight:700; }
  .days { font-family:'Inconsolata',monospace; font-weight:600; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fog-dim); flex:0 0 auto; }
  .rail { margin-top:16px; height:4px; background:var(--line-soft); border-radius:4px; overflow:hidden; position:relative; }
  .rail-fill { height:100%; background:linear-gradient(90deg,var(--cool),var(--sig)); border-radius:4px; transition:width .3s; }
  .rail-labels { display:flex; justify-content:space-between; margin-top:6px; font-size:10px; letter-spacing:0.1em; color:var(--fog-dim); text-transform:uppercase; }
  .weekbar {
    display:flex; gap:8px; overflow-x:auto; padding:12px 16px; border-bottom:1px solid var(--line);
    scrollbar-width:none; position:sticky; top:0; z-index:15; background:var(--ink-2);
  }
  .weekbar::-webkit-scrollbar { display:none; }
  .wk {
    flex:0 0 auto; padding:8px 12px; border:1px solid var(--line); border-radius:10px; background:var(--ink); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px; min-width:62px; transition:border-color .15s,background .15s;
  }
  .wk .n { font-size:10px; color:var(--fog); letter-spacing:0.1em; }
  .wk .mi { font-size:15px; font-weight:700; }
  .wk.active { border-color:var(--sig); background:var(--ink-3); }
  .wk.active .mi { color:var(--sig); }
  .wk.done { opacity:0.5; }
  .wk .ph { width:100%; height:3px; border-radius:3px; }
  main { padding:18px 16px 60px; max-width:620px; margin:0 auto; }
  .week-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:4px; }
  .week-panel { background:var(--ink-2); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:16px; }
  .week-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .week-title { font-family:'Fraunces',serif; font-size:26px; font-weight:900; color:#fff; }
  .week-phase { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; padding:3px 8px; border-radius:20px; border:1px solid var(--line); }
  .week-sub { color:#eef2ee; font-weight:600; font-size:13px; margin-top:6px; }
  .week-sub b { color:#fff; font-weight:700; }
  .week-live { font-family:'Inconsolata',monospace; font-size:12px; color:var(--fog); margin-top:8px; letter-spacing:0.02em; }
  .week-live b { color:var(--chalk); font-weight:700; }
  .day { border:1px solid var(--line); border-radius:14px; background:var(--ink-3); margin-bottom:10px; overflow:hidden; }
  .day.rest { background:var(--ink-2); }
  .day-top { display:flex; align-items:center; gap:12px; padding:13px 15px; cursor:pointer; }
  .chev { font-family:'Inconsolata',monospace; font-size:22px; color:var(--fog-dim); flex:0 0 auto; margin-left:2px; line-height:1; }
  .day:active { background:var(--ink-2); }
  .day.rest:active { background:#131c19; }

  /* bottom sheet */
  .scrim { position:fixed; inset:0; background:rgba(4,8,7,0.6); opacity:0; pointer-events:none; transition:opacity .22s; z-index:40; backdrop-filter:blur(2px); }
  .scrim.open { opacity:1; pointer-events:auto; }
  .sheet {
    position:fixed; left:0; right:0; bottom:0; z-index:41; background:var(--ink-2);
    border-top:1px solid var(--line); border-radius:22px 22px 0 0;
    padding:10px 22px calc(28px + env(safe-area-inset-bottom));
    transform:translateY(100%); transition:transform .28s cubic-bezier(.22,.61,.36,1);
    max-width:620px; margin:0 auto; max-height:82vh; overflow-y:auto;
  }
  .sheet.open { transform:translateY(0); }
  .sheet-grip { width:40px; height:4px; border-radius:4px; background:var(--line); margin:8px auto 18px; }
  .sheet-eyebrow { font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--fog); font-weight:700; margin-bottom:8px; }
  .sheet-title { font-family:'Fraunces',serif; font-size:28px; font-weight:600; line-height:1.05; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .sheet-stats { display:flex; gap:20px; margin:18px 0; padding:14px 0; border-top:1px solid var(--line-soft); border-bottom:1px solid var(--line-soft); }
  .sheet-stat .k { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fog); }
  .sheet-stat .v { font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin-top:2px; }
  .sheet-h { font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--sig); font-weight:700; margin-bottom:9px; }
  .sheet-focus { font-size:15.5px; line-height:1.6; color:var(--chalk); }
  .sheet-connect { margin-top:20px; padding-top:16px; border-top:1px solid var(--line-soft); font-size:12px; color:var(--fog-dim); display:flex; align-items:center; gap:9px; }
  .sheet-connect .dot { width:8px; height:8px; border-radius:50%; border:1.5px solid var(--fog-dim); }
  .dow { font-size:15px; letter-spacing:0.06em; color:var(--chalk); text-transform:uppercase; width:42px; flex:0 0 auto; font-weight:700; display:flex; flex-direction:column; gap:2px; }
  .daydate { font-size:10px; font-weight:600; letter-spacing:0.04em; color:var(--fog-dim); text-transform:none; }
  .day.rest .dow { color:var(--fog); }
  .day-main { flex:1; min-width:0; }
  .day-type { font-size:17px; font-weight:700; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .day.rest .day-type { font-weight:600; color:var(--fog); }
  .tag { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; padding:2px 6px; border-radius:5px; font-weight:700; }
  .tag.easy { background:rgba(90,200,224,0.14); color:var(--cool); }
  .tag.long { background:rgba(232,200,106,0.14); color:var(--gold); }
  .tag.quality { background:rgba(255,107,74,0.14); color:var(--hot); }
  .tag.rest { background:rgba(142,163,156,0.1); color:var(--fog-dim); }
  .day-detail { font-size:13.5px; font-weight:500; color:var(--fog); margin-top:3px; }
  .day-detail .hi { color:var(--chalk); }
  .miles { font-family:'Fraunces',serif; font-size:22px; font-weight:600; flex:0 0 auto; }
  .miles small { font-size:11px; color:var(--fog); font-family:'Inconsolata'; }
  .connect { border-top:1px dashed var(--line-soft); padding:9px 15px; display:flex; align-items:center; gap:9px; font-size:11px; color:var(--fog-dim); letter-spacing:0.03em; }
  .connect .dot { width:7px; height:7px; border-radius:50%; border:1.5px solid var(--fog-dim); flex:0 0 auto; }
  .banner { margin:0 16px 16px; padding:11px 14px; border:1px solid var(--line); border-left:3px solid var(--cool); border-radius:8px; background:var(--ink-2); font-size:12px; color:var(--fog); }
  .banner b { color:var(--chalk); }
  .strava-row { display:flex; justify-content:flex-end; margin-top:10px; }
  .strava-pill { font-size:11px; letter-spacing:0.03em; color:var(--fog); display:inline-flex; align-items:center; gap:7px; padding:5px 12px; border:1px solid var(--line); border-radius:20px; background:var(--ink-2); }
  .strava-pill .dot { width:6px; height:6px; border-radius:50%; background:var(--fog-dim); flex:0 0 auto; }
  .strava-pill.connected .dot { background:var(--sig); }
  .strava-pill.error .dot { background:var(--hot); }
  .strava-pill button { background:none; border:none; padding:0; margin:0; font:inherit; color:var(--chalk); text-decoration:underline; text-underline-offset:2px; cursor:pointer; }
  #todayCard { padding:18px 16px 0; max-width:620px; margin:0 auto; }
  .today-card { background:linear-gradient(180deg,var(--ink-3),var(--ink-2)); border:1px solid var(--line); border-radius:16px; padding:16px 18px; }
  .today-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .today-eyebrow { font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--fog); font-weight:700; }
  .today-phase { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700; padding:3px 8px; border-radius:20px; border:1px solid var(--line); flex:0 0 auto; }
  .today-type { font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:#fff; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .today-stats { display:flex; gap:22px; margin:14px 0 2px; }
  .today-stats .k { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fog); }
  .today-stats .v { font-family:'Fraunces',serif; font-size:20px; font-weight:600; margin-top:2px; color:var(--chalk); }
  .today-rest-badge { font-family:'Fraunces',serif; font-size:22px; font-weight:600; color:var(--fog); }
  .today-rest-note { font-size:13.5px; color:var(--fog); margin-top:6px; line-height:1.55; }
  .today-tomorrow { margin-top:16px; padding-top:14px; border-top:1px dashed var(--line-soft); }
  .today-tomorrow-label { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--fog-dim); font-weight:700; margin-bottom:6px; }
  .today-tomorrow-body { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:15px; font-weight:600; color:var(--chalk); }
  .today-tomorrow-miles { font-family:'Fraunces',serif; font-size:15px; color:var(--fog); }
  .today-tomorrow-detail { font-size:12.5px; color:var(--fog); margin-top:3px; }
  .completed-row { display:flex; align-items:center; gap:8px; padding:9px 15px; font-size:12.5px; color:var(--chalk); border-top:1px dashed var(--line-soft); }
  .completed-check { color:var(--sig); font-weight:700; }
  .day.completed { border-color:rgba(216,255,62,0.28); }
  .today-card .completed-row { margin-top:14px; padding:12px 0 0 0; }
  .coach-box { margin-top:0; padding:10px 15px 13px; border-top:1px dashed var(--line-soft); }
  .today-card .coach-box { padding:10px 0 0 0; }
  .coach-label { font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); font-weight:700; display:block; margin-bottom:4px; }
  .coach-text { font-size:13px; line-height:1.55; color:var(--chalk); font-style:italic; }
  .coach-loading-text { font-size:12px; color:var(--fog-dim); font-style:italic; }
  .sync-note { margin:10px 16px 0; font-size:11px; color:var(--fog-dim); max-width:620px; }
  footer { text-align:center; padding:8px 16px 20px; font-size:10px; letter-spacing:0.1em; color:var(--fog-dim); text-transform:uppercase; }
</style>
</head>
<body>
<header>
  <div class="topline">
    <span class="eyebrow">TCS NYC Marathon · Nov 1</span>
    <span class="days"><span id="dcount">17</span> weeks to race</span>
  </div>
  <div class="rail"><div class="rail-fill" id="railfill" style="width:14%"></div></div>
  <div class="rail-labels"><span>Base</span><span>Build</span><span>Peak</span><span>Taper</span><span>Race</span></div>
  <div class="strava-row"><div class="strava-pill" id="stravaPill"><span class="dot"></span>Strava</div></div>
</header>
<div id="todayCard"></div>
<div class="weekbar" id="weekbar"></div>
<main id="app"></main>
<footer>adamneedelman / marathon-plan</footer>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true">
  <div class="sheet-grip"></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>
<script>
const FIELD = { weeks:'weeks', weekNum:'week', phase:'phase', label:'label', days:'days', dow:'dow', type:'type', kind:'kind', miles:'miles', pace:'pace', hr:'hr', focus:'focus' };
const PHASE_COLOR = { Base:'#5ac8e0', Build:'#d8ff3e', Peak:'#e8c86a', Taper:'#8ea39c', Bridge:'#8ea39c' };

// Live plan source — reads from the GitHub repo so chat edits appear on next open.
const PLAN_URL = 'https://raw.githubusercontent.com/adamneedelman/nycmarathonan/main/plan-full.json';
const BLOCK_START = '2026-07-06'; // Monday of week 1, used to auto-select the current week

let PLAN = { race:'2026-11-01', weeks:[] };

function weeklyMiles(w){ return (w[FIELD.days]||[]).reduce((s,d)=>s+(d.miles||0),0); }

// Eastern-time date resolution, so "today" tracks the runner's home timezone
// regardless of device locale (matches /lib/plan-week.js on the server side).
const EASTERN_TZ = 'America/New_York';
const MONTHS = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
function toIsoDate(shortDate, year){
  const [monthAbbr, day] = shortDate.split(' ');
  const month = MONTHS[monthAbbr];
  return `${year}-${String(month+1).padStart(2,'0')}-${String(Number(day)).padStart(2,'0')}`;
}
function todayIsoInEastern(){
  return new Intl.DateTimeFormat('en-CA', { timeZone: EASTERN_TZ }).format(new Date());
}
function planYear(){
  return Number(((PLAN.meta && PLAN.meta.blockStart) || BLOCK_START).slice(0,4));
}

// Flattened list of every plan day with its resolved ISO date, used to find
// "today" and "tomorrow" and to resolve the current week from real dates
// rather than a fixed Monday offset.
let ALL_DAYS = [];
function buildAllDays(){
  const year = planYear();
  ALL_DAYS = [];
  PLAN.weeks.forEach((w, wi) => {
    w.days.forEach((d, di) => {
      ALL_DAYS.push({ iso: toIsoDate(d.date, year), week: w, day: d, weekIndex: wi, dayIndex: di });
    });
  });
}
function todayEntryIndex(){
  if(!ALL_DAYS.length) return -1;
  const today = todayIsoInEastern();
  let idx = ALL_DAYS.findIndex(e => e.iso === today);
  if(idx === -1){
    idx = today < ALL_DAYS[0].iso ? 0 : ALL_DAYS.length - 1;
  }
  return idx;
}

let hasScrolledToActiveWeek = false;
function scrollWeekbarToActive(){
  if(hasScrolledToActiveWeek) return;
  const activeEl = document.querySelector('#weekbar .wk.active');
  if(activeEl){
    activeEl.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
    hasScrolledToActiveWeek = true;
  }
}

async function loadPlan(){
  try {
    const res = await fetch(PLAN_URL + '?t=' + Date.now()); // cache-bust so edits show
    if(!res.ok) throw new Error('HTTP '+res.status);
    PLAN = await res.json();
    buildAllDays();
    const idx = todayEntryIndex();
    activeWeek = idx >= 0 ? ALL_DAYS[idx].weekIndex : 0;
    render();
    scrollWeekbarToActive();
  } catch(err) {
    document.getElementById('app').innerHTML =
      '<div style="padding:24px;color:#8ea39c;font-size:14px;line-height:1.6">'
      + 'Couldn\u2019t load the plan.<br><br>Check your connection and pull to refresh. '
      + 'If this persists, the plan file may still be syncing.<br><br>'
      + '<span style="color:#5c6f68;font-size:12px">'+String(err)+'</span></div>';
  }
}
function openSheet(d, w){
  const isRest = !d.miles;
  const c = PHASE_COLOR[w.phase] || '#8ea39c';
  let stats = '';
  if(!isRest){
    stats = `<div class="sheet-stats">
      <div class="sheet-stat"><div class="k">Distance</div><div class="v">${d.miles} mi</div></div>
      ${d.pace?`<div class="sheet-stat"><div class="k">Pace</div><div class="v" style="font-size:18px">${d.pace}</div></div>`:''}
      ${d.hr?`<div class="sheet-stat"><div class="k">HR</div><div class="v" style="font-size:18px">${d.hr}</div></div>`:''}
    </div>`;
  }
  const activity = !isRest && d.date ? matchActivityForIso(toIsoDate(d.date, planYear())) : null;
  const connect = !isRest
    ? (activity ? renderCompletionBlock(activity, d, w) : `<div class="sheet-connect"><span class="dot"></span>No run logged yet</div>`)
    : '';
  document.getElementById('sheetBody').innerHTML = `
    <div class="sheet-eyebrow">${d.dow} · Week ${w.week} · ${w.phase}</div>
    <div class="sheet-title">${d.type}<span class="tag ${d.kind}">${d.kind}</span></div>
    ${stats}
    <div class="sheet-h">Workout overview</div>
    <div class="sheet-focus">${d.focus || 'No guidance set for this day yet.'}</div>
    ${connect}`;
  document.getElementById('scrim').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSheet(){
  document.getElementById('scrim').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('scrim').onclick = closeSheet;


function daysUntil(iso){ return Math.max(0, Math.round((new Date(iso+'T00:00:00')-new Date())/86400000)); }
let activeWeek = 0;

// Strava activities, matched to plan days by date (longest run wins on multi-run days).
let activitiesByDate = new Map();
let stravaActivitiesConnected = false;
let stravaActivitiesError = false;
function matchActivityForIso(iso){
  return activitiesByDate.get(iso) || null;
}
function weeklyActualMiles(w){
  const year = planYear();
  let total = 0, any = false;
  w.days.forEach(d=>{
    const a = d.date ? activitiesByDate.get(toIsoDate(d.date, year)) : null;
    if(a){ total += a.distance; any = true; }
  });
  return any ? Math.round(total*10)/10 : null;
}

// Coach Claude blurbs, keyed by Strava activity id. Generated once per activity
// (server caches indefinitely); this map just tracks in-session render state.
let coachBlurbs = new Map();
function buildPlannedWorkoutPayload(d, w){
  return { type:d.type, kind:d.kind, miles:d.miles, pace:d.pace, hr:d.hr, focus:d.focus, phase:w.phase, week:w.week, dow:d.dow, date:d.date };
}
function renderCoachBlock(activityId){
  const entry = coachBlurbs.get(activityId);
  if(!entry) return '';
  if(entry.status === 'loading'){
    return `<div class="coach-box"><span class="coach-label">Coach Claude</span><span class="coach-loading-text">Thinking…</span></div>`;
  }
  if(entry.status !== 'done' || !entry.text) return '';
  return `<div class="coach-box"><span class="coach-label">Coach Claude</span><div class="coach-text">${escapeHtml(entry.text)}</div></div>`;
}
async function requestCoachAnalysis(activity, plannedWorkout){
  if(coachBlurbs.has(activity.id)) return;
  coachBlurbs.set(activity.id, { status:'loading' });
  render();
  try {
    const res = await fetch('/api/coach-analysis', {
      method:'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ activityId: activity.id, activity, plannedWorkout }),
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    coachBlurbs.set(activity.id, data.blurb ? { status:'done', text:data.blurb } : { status:'error' });
  } catch(err){
    console.error('Coach analysis failed:', err);
    coachBlurbs.set(activity.id, { status:'error' });
  }
  render();
}
function renderCompletionBlock(activity, d, w){
  if(!activity) return `<div class="connect"><span class="dot"></span>No run logged</div>`;
  const hrParts = [];
  if(activity.average_heartrate) hrParts.push(`${activity.average_heartrate} avg`);
  if(activity.max_heartrate) hrParts.push(`${activity.max_heartrate} max`);
  const hrText = hrParts.length ? ` · HR ${hrParts.join(' / ')}` : '';
  const paceText = activity.avg_pace ? ` @ ${activity.avg_pace}` : '';
  requestCoachAnalysis(activity, buildPlannedWorkoutPayload(d, w));
  return `<div class="completed-row"><span class="completed-check">✓</span><span class="completed-text">${activity.distance} mi${paceText}${hrText}</span></div>${renderCoachBlock(activity.id)}`;
}

function renderTodayCard(){
  const el = document.getElementById('todayCard');
  if(!el) return;
  if(!ALL_DAYS.length){ el.innerHTML = ''; return; }
  const idx = todayEntryIndex();
  const entry = ALL_DAYS[idx];
  const isActuallyToday = entry.iso === todayIsoInEastern();
  const w = entry.week, d = entry.day;
  const phaseColor = PHASE_COLOR[w.phase] || '#8ea39c';

  let bodyHtml;
  if(!d.miles){
    const tomorrowEntry = ALL_DAYS[idx+1];
    let tomorrowHtml = '';
    if(tomorrowEntry){
      const td = tomorrowEntry.day;
      const tomorrowIsRest = !td.miles;
      tomorrowHtml = `<div class="today-tomorrow">
        <div class="today-tomorrow-label">Tomorrow</div>
        <div class="today-tomorrow-body">${td.type}<span class="tag ${td.kind}">${td.kind}</span>${!tomorrowIsRest?`<span class="today-tomorrow-miles">${td.miles} mi</span>`:''}</div>
        ${!tomorrowIsRest && td.pace ? `<div class="today-tomorrow-detail">${td.pace}</div>` : ''}
      </div>`;
    }
    bodyHtml = `<div class="today-rest-badge">Rest day</div><div class="today-rest-note">${d.focus || 'Full rest.'}</div>${tomorrowHtml}`;
  } else {
    const activity = matchActivityForIso(entry.iso);
    bodyHtml = `<div class="today-type">${d.type}<span class="tag ${d.kind}">${d.kind}</span></div>
      <div class="today-stats">
        <div class="today-stat"><div class="k">Distance</div><div class="v">${d.miles} mi</div></div>
        ${d.pace?`<div class="today-stat"><div class="k">Pace</div><div class="v" style="font-size:16px">${d.pace}</div></div>`:''}
        ${d.hr?`<div class="today-stat"><div class="k">HR</div><div class="v" style="font-size:16px">${d.hr}</div></div>`:''}
      </div>
      ${renderCompletionBlock(activity, d, w)}`;
  }

  el.innerHTML = `<div class="today-card">
    <div class="today-head">
      <div class="today-eyebrow">${isActuallyToday ? 'Today' : 'Up next'} · ${d.dow} · Week ${w.week}</div>
      <div class="today-phase" style="color:${phaseColor};border-color:${phaseColor}44">${w.phase}</div>
    </div>
    ${bodyHtml}
  </div>${stravaActivitiesError ? `<div class="sync-note">Strava sync unavailable — showing plan data.</div>` : ''}`;
}

function render(){
  renderTodayCard();
  const raceDate = (PLAN.meta && PLAN.meta.raceDate) || PLAN.race || '2026-11-01';
  document.getElementById('dcount').textContent = Math.max(0, Math.ceil((new Date(raceDate+'T00:00:00')-new Date())/(86400000*7)));
  const wb = document.getElementById('weekbar'); wb.innerHTML='';
  PLAN.weeks.forEach((w,i)=>{
    const el=document.createElement('div');
    el.className='wk'+(i===activeWeek?' active':'')+(i<activeWeek?' done':'');
    el.innerHTML=`<span class="ph" style="background:${PHASE_COLOR[w.phase]||'#8ea39c'}"></span><span class="n">WK ${w.week}</span><span class="mi">${weeklyMiles(w)}</span>`;
    el.onclick=()=>{ activeWeek=i; render(); window.scrollTo({top:0,behavior:'smooth'}); };
    wb.appendChild(el);
  });
  const w=PLAN.weeks[activeWeek];
  const runningDays=w.days.filter(d=>d.miles>0).length;
  const app=document.getElementById('app');
  const actualMiles = stravaActivitiesConnected ? weeklyActualMiles(w) : null;
  const liveMileage = stravaActivitiesConnected
    ? `<div class="week-live">Week ${w.week}: <b>${actualMiles!=null?actualMiles.toFixed(1):'--'}</b> / ${weeklyMiles(w).toFixed(1)} miles</div>`
    : '';
  let html=`<div class="week-panel"><div class="week-head"><div class="week-title">Week ${w.week}</div><div class="week-phase" style="color:${PHASE_COLOR[w.phase]};border-color:${PHASE_COLOR[w.phase]}44">${w.phase}</div></div><div class="week-sub">${w.label} · <b>${weeklyMiles(w)} mi</b> · ${runningDays} runs</div>${liveMileage}</div>`;
  const year = planYear();
  w.days.forEach((d,di)=>{
    const isRest=!d.miles;
    const dateStr = d.date ? `<span class="daydate">${d.date}</span>` : '';
    const activity = !isRest && d.date ? matchActivityForIso(toIsoDate(d.date, year)) : null;
    html+=`<div class="day ${isRest?'rest':''}${activity?' completed':''}" data-di="${di}"><div class="day-top"><div class="dow">${d.dow}${dateStr}</div><div class="day-main"><div class="day-type">${d.type}<span class="tag ${d.kind}">${d.kind}</span></div>${!isRest?`<div class="day-detail">${d.pace?`<span class="hi">${d.pace}</span>`:''}${d.hr?` · HR ${d.hr}`:''}</div>`:''}</div>${!isRest?`<div class="miles">${d.miles}<small> mi</small></div>`:'<span class="chev">›</span>'}${!isRest?'<span class="chev">›</span>':''}</div>${!isRest?renderCompletionBlock(activity, d, w):''}</div>`;
  });
  app.innerHTML=html;
  app.querySelectorAll('.day').forEach(el=>{
    el.onclick=()=>openSheet(w.days[+el.dataset.di], w);
  });
  document.getElementById('railfill').style.width=Math.max(6,(activeWeek/PLAN.weeks.length)*100)+'%';
}
loadPlan();
// Re-fetch when returning to the app (e.g. after a chat edit), so changes appear.
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) loadPlan(); });

async function loadActivities(){
  try {
    const res = await fetch('/api/strava/activities?t=' + Date.now(), { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    stravaActivitiesConnected = !!data.connected;
    stravaActivitiesError = !!data.error;
    activitiesByDate = new Map();
    (data.activities || []).forEach(a=>{
      const existing = activitiesByDate.get(a.date);
      if(!existing || a.distance > existing.distance) activitiesByDate.set(a.date, a);
    });
  } catch(err){
    console.error('Strava activities fetch failed:', err);
    stravaActivitiesConnected = false;
    stravaActivitiesError = true;
    activitiesByDate = new Map();
  }
  if(PLAN.weeks && PLAN.weeks.length) render();
}
loadActivities();

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderStravaPill(state){
  const el = document.getElementById('stravaPill');
  if(!el) return;
  el.classList.remove('connected','error');
  if(state.error){
    el.classList.add('error');
    el.innerHTML = `<span class="dot"></span>Strava error <button type="button" data-action="strava-retry">retry</button>`;
    return;
  }
  if(state.connected){
    el.classList.add('connected');
    el.innerHTML = `<span class="dot"></span>Connected as ${escapeHtml(state.athlete_firstname || 'athlete')} <button type="button" data-action="strava-disconnect">Disconnect</button>`;
  } else {
    el.innerHTML = `<span class="dot"></span><button type="button" data-action="strava-connect">Connect Strava</button>`;
  }
}

// Delegated on the pill container (not re-bound per render) so clicks always
// work regardless of how many times renderStravaPill has redrawn its innerHTML.
document.getElementById('stravaPill').addEventListener('click', (e)=>{
  const action = e.target.closest('[data-action]')?.dataset.action;
  if(action === 'strava-connect') window.location.href = '/api/strava/authorize';
  else if(action === 'strava-disconnect') disconnectStrava();
  else if(action === 'strava-retry') loadStravaStatus();
});

async function loadStravaStatus(){
  try {
    const res = await fetch('/api/strava/status?t=' + Date.now(), { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    renderStravaPill(data);
  } catch(err){
    console.error('Strava status check failed:', err);
    renderStravaPill({ connected:false, error:true });
  }
}

async function disconnectStrava(){
  const el = document.getElementById('stravaPill');
  if(el) el.innerHTML = `<span class="dot"></span>Disconnecting…`;
  try {
    await fetch('/api/strava/disconnect', { method:'POST', cache: 'no-store' });
  } catch(err) {
    console.error('Strava disconnect request failed:', err);
  }
  loadStravaStatus();
}

// Surface OAuth errors from the callback redirect, then strip the params from the URL.
function handleStravaRedirectParams(){
  const params = new URLSearchParams(window.location.search);
  const err = params.get('strava_error');
  if(err){
    const notice = document.createElement('div');
    notice.className = 'banner';
    notice.style.borderLeftColor = 'var(--hot)';
    notice.innerHTML = `<b>Strava connection failed.</b> ${escapeHtml(err)}`;
    document.body.insertBefore(notice, document.getElementById('app'));
  }
  if(params.has('strava') || params.has('strava_error')){
    params.delete('strava');
    params.delete('strava_error');
    const qs = params.toString();
    window.history.replaceState({}, '', window.location.pathname + (qs ? '?'+qs : ''));
  }
}

handleStravaRedirectParams();
loadStravaStatus();
</script>
